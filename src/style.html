<style>
/* ========================================
   CSS Custom Properties
   ======================================== */
:root {
  --primary-dark: #2c4a7c;
  --primary-light: #5c7cba;
  --gold-dark: #c9a84c;
  --gold-bright: #f6e27a;
  --sakura: #f0b8c8;
  --bg: #eef2f9;
  --text: #0b1f3a;
  --white: #ffffff;
  --border: #d4dce8;
  --border-light: #e8edf5;
  --shadow-sm: 0 1px 3px rgba(11, 31, 58, 0.08);
  --shadow-md: 0 2px 8px rgba(11, 31, 58, 0.12);
  --shadow-lg: 0 4px 16px rgba(11, 31, 58, 0.15);
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-pill: 999px;
}

/* Member color assignments */
.member-0 { --member-color: #2c4a7c; }
.member-1 { --member-color: #c9a84c; }
.member-2 { --member-color: #d4769a; }
.member-3 { --member-color: #4a8c6f; }
.member-4 { --member-color: #8b6bb5; }

/* ========================================
   Reset & Base
   ======================================== */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Meiryo',
               system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
}

.app {
  max-width: 1200px;
  margin: 0 auto;
  padding-bottom: 40px;
}

.hidden {
  display: none !important;
}

/* ========================================
   Header
   ======================================== */
.header {
  background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary-dark) 100%);
  color: var(--white);
  padding: 14px 20px 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
  box-shadow: 0 2px 8px rgba(44, 74, 124, 0.3);
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-title {
  font-size: 19px;
  font-weight: bold;
  letter-spacing: 0.5px;
}

.header-brand {
  font-size: 10px;
  opacity: 0.75;
  letter-spacing: 1.5px;
  margin-top: 2px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

/* ========================================
   Gold Shimmer Line
   ======================================== */
.gold-line {
  height: 3px;
  background: linear-gradient(90deg,
    transparent 0%,
    #c9a84c 15%,
    #f6e27a 35%,
    #f9f0c8 50%,
    #f6e27a 65%,
    #c9a84c 85%,
    transparent 100%
  );
  background-size: 200% 100%;
  animation: goldShimmer 4s ease-in-out infinite;
}

@keyframes goldShimmer {
  0% { background-position: 100% 0; }
  50% { background-position: 0% 0; }
  100% { background-position: 100% 0; }
}

/* ========================================
   Save Status
   ======================================== */
.save-status {
  padding: 4px 10px;
  border-radius: var(--radius-pill);
  font-size: 11px;
  font-weight: 600;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  transition: all 0.3s ease;
  white-space: nowrap;
}

.save-status-saved {
  background-color: rgba(76, 175, 80, 0.2);
  color: #c8e6c9;
  border: 1px solid rgba(76, 175, 80, 0.3);
}

.save-status-saving {
  background-color: rgba(33, 150, 243, 0.2);
  color: #bbdefb;
  border: 1px solid rgba(33, 150, 243, 0.3);
  animation: pulse 1.5s ease-in-out infinite;
}

.save-status-unsaved {
  background-color: rgba(255, 152, 0, 0.2);
  color: #ffe0b2;
  border: 1px solid rgba(255, 152, 0, 0.3);
}

.save-status-error {
  background-color: rgba(244, 67, 54, 0.2);
  color: #ffcdd2;
  border: 1px solid rgba(244, 67, 54, 0.3);
}

.save-status-offline {
  background-color: rgba(158, 158, 158, 0.2);
  color: #e0e0e0;
  border: 1px solid rgba(158, 158, 158, 0.3);
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

/* ========================================
   Sync Info
   ======================================== */
.sync-info {
  display: flex;
  align-items: center;
  gap: 6px;
}

.sync-label {
  font-size: 10px;
  opacity: 0.75;
  white-space: nowrap;
}

.btn-sync {
  width: 30px;
  height: 30px;
  border: 1px solid rgba(255,255,255,0.35);
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  color: var(--white);
  font-size: 16px;
  cursor: pointer;
  transition: background 0.2s, transform 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.btn-sync:hover {
  background: rgba(255,255,255,0.3);
  transform: rotate(90deg);
}

.btn-sync.syncing {
  animation: spinSync 1s linear infinite;
  pointer-events: none;
}

@keyframes spinSync {
  to { transform: rotate(360deg); }
}

/* ========================================
   Portal Button (Pill)
   ======================================== */
.header-portal-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 7px 14px;
  border-radius: var(--radius-pill);
  background: rgba(255,255,255,0.18);
  border: 1px solid rgba(255,255,255,0.35);
  color: var(--white);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-decoration: none;
  transition: background 0.2s, border-color 0.2s, transform 0.15s;
  white-space: nowrap;
}

.header-portal-btn:hover {
  background: rgba(255,255,255,0.30);
  border-color: rgba(246,226,122,0.6);
  transform: translateY(-1px);
}

.header-portal-btn .portal-icon {
  font-size: 14px;
}

/* ========================================
   Tab Navigation
   ======================================== */
.tab-nav {
  display: flex;
  background: var(--white);
  border-bottom: 2px solid var(--border);
  padding: 0 16px;
}

.tab-btn {
  padding: 12px 24px;
  border: none;
  background: none;
  font-size: 14px;
  font-weight: 600;
  color: #7a8ba5;
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  letter-spacing: 0.3px;
}

.tab-btn:hover {
  color: var(--primary-dark);
}

.tab-btn.active {
  color: var(--primary-dark);
  border-bottom-color: var(--gold-dark);
}

/* ========================================
   Member Filter Bar
   ======================================== */
.filter-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 10px 16px;
  background: var(--white);
  border-bottom: 1px solid var(--border-light);
}

.filter-btn {
  padding: 5px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-pill);
  background: var(--white);
  font-size: 12px;
  font-weight: 600;
  color: #7a8ba5;
  cursor: pointer;
  transition: all 0.2s;
}

.filter-btn:hover {
  border-color: var(--primary-light);
  color: var(--primary-dark);
}

.filter-btn.active {
  background: var(--primary-dark);
  border-color: var(--primary-dark);
  color: var(--white);
}

.filter-btn.member-active {
  background: var(--member-color, var(--primary-dark));
  border-color: var(--member-color, var(--primary-dark));
  color: var(--white);
}

/* ========================================
   Status Message
   ======================================== */
.status-message {
  padding: 10px 20px;
  font-size: 13px;
  border-bottom: 1px solid rgba(0,0,0,0.08);
}

.status-message.success {
  background-color: #d4edda;
  color: #155724;
}

.status-message.error {
  background-color: #f8d7da;
  color: #721c24;
}

.status-message.info {
  background-color: #d1ecf1;
  color: #0c5460;
}

/* ========================================
   Loading
   ======================================== */
.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px;
  gap: 14px;
  color: #7a8ba5;
}

.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--primary-dark);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ========================================
   Date Navigation
   ======================================== */
.date-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 14px 16px;
  background: var(--white);
  border-bottom: 1px solid var(--border-light);
}

.nav-btn {
  width: 34px;
  height: 34px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--white);
  color: var(--primary-dark);
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.nav-btn:hover {
  background: var(--primary-dark);
  color: var(--white);
  border-color: var(--primary-dark);
}

.date-display {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  min-width: 160px;
  text-align: center;
}

.nav-btn-text {
  padding: 6px 16px;
  border: 1px solid var(--gold-dark);
  border-radius: var(--radius-pill);
  background: var(--white);
  color: var(--gold-dark);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.nav-btn-text:hover {
  background: var(--gold-dark);
  color: var(--white);
}

/* ========================================
   TODAY VIEW: Member Cards
   ======================================== */
.member-card {
  background: var(--white);
  border-radius: var(--radius-md);
  margin: 12px 16px;
  box-shadow: var(--shadow-sm);
  border-left: 4px solid var(--member-color, var(--primary-dark));
  overflow: hidden;
  transition: box-shadow 0.2s;
}

.member-card:hover {
  box-shadow: var(--shadow-md);
}

.member-card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  background: linear-gradient(135deg, rgba(44,74,124,0.03) 0%, rgba(44,74,124,0.06) 100%);
  border-bottom: 1px solid var(--border-light);
}

.member-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--member-color, var(--primary-dark));
  color: var(--white);
  font-size: 13px;
  font-weight: 700;
}

.member-name {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
}

.no-calendar-notice {
  padding: 8px 16px;
  font-size: 12px;
  color: #a0a0a0;
  font-style: italic;
}

/* ========================================
   Calendar Events (read-only)
   ======================================== */
.events-section {
  padding: 8px 16px;
}

.events-section-title {
  font-size: 11px;
  font-weight: 600;
  color: #7a8ba5;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}

.event-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  margin-bottom: 4px;
  border-radius: var(--radius-sm);
  background: #f7f9fc;
  font-size: 13px;
  border-left: 3px solid var(--member-color, var(--primary-light));
}

.event-time {
  font-size: 12px;
  font-weight: 600;
  color: var(--primary-dark);
  white-space: nowrap;
  min-width: 90px;
}

.event-title {
  flex: 1;
  color: var(--text);
  font-weight: 500;
}

.event-badge-allday {
  display: inline-block;
  padding: 1px 8px;
  border-radius: var(--radius-pill);
  background: var(--gold-bright);
  color: #7a6520;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.3px;
}

.event-memo {
  font-size: 11px;
  color: #7a8ba5;
  margin-left: auto;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 120px;
}

.no-events {
  padding: 8px 0;
  font-size: 12px;
  color: #a0a0a0;
}

/* Event color keys */
.event-color-1 { border-left-color: #4285f4; }
.event-color-2 { border-left-color: #0b8043; }
.event-color-3 { border-left-color: #8e24aa; }
.event-color-4 { border-left-color: #e67c73; }
.event-color-5 { border-left-color: #f6bf26; }
.event-color-6 { border-left-color: #039be5; }
.event-color-7 { border-left-color: #616161; }
.event-color-8 { border-left-color: #3f51b5; }
.event-color-9 { border-left-color: #d4769a; }
.event-color-10 { border-left-color: #33b679; }
.event-color-11 { border-left-color: #d50000; }

/* ========================================
   Manual Input Section (Board fields)
   ======================================== */
.board-section {
  padding: 10px 16px 14px;
  border-top: 1px solid var(--border-light);
  background: linear-gradient(135deg, rgba(201,168,76,0.02) 0%, rgba(201,168,76,0.05) 100%);
}

.board-section-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--gold-dark);
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}

.board-fields {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}

.board-field {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.board-field label {
  font-size: 11px;
  font-weight: 600;
  color: #7a8ba5;
}

.board-field input {
  width: 100%;
  padding: 7px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  color: var(--text);
  background: var(--white);
  transition: border-color 0.2s, box-shadow 0.2s;
  font-family: inherit;
}

.board-field input:focus {
  outline: none;
  border-color: var(--primary-light);
  box-shadow: 0 0 0 2px rgba(92, 124, 186, 0.15);
}

.board-field input[type="time"] {
  font-variant-numeric: tabular-nums;
}

/* ========================================
   WEEK VIEW: Grid
   ======================================== */
.week-grid-wrapper {
  overflow-x: auto;
  padding: 0 16px 16px;
}

.week-grid {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  background: var(--white);
  border-radius: var(--radius-md);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}

.week-grid th {
  padding: 10px 6px;
  background: var(--primary-dark);
  color: var(--white);
  font-weight: 600;
  text-align: center;
  font-size: 12px;
  white-space: nowrap;
}

.week-grid th.weekend {
  background: #3a5a8e;
}

.week-grid th.today-col {
  background: var(--gold-dark);
  color: var(--white);
}

.week-grid td {
  border: 1px solid var(--border-light);
  padding: 4px 5px;
  vertical-align: top;
  min-width: 100px;
  max-width: 140px;
  height: 60px;
  cursor: pointer;
  transition: background 0.15s;
}

.week-grid td:hover {
  background: #f0f4fb;
}

.week-grid td.today-col {
  background: rgba(201,168,76,0.06);
}

.week-grid td.today-col:hover {
  background: rgba(201,168,76,0.12);
}

.week-grid .member-name-cell {
  padding: 8px 10px;
  font-weight: 700;
  font-size: 13px;
  background: #f7f9fc;
  white-space: nowrap;
  cursor: default;
  border-left: 3px solid var(--member-color, var(--primary-dark));
}

.week-event-item {
  padding: 2px 4px;
  margin-bottom: 2px;
  border-radius: 3px;
  font-size: 11px;
  color: var(--text);
  background: rgba(92, 124, 186, 0.08);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.week-board-info {
  padding: 2px 4px;
  margin-top: 2px;
  border-radius: 3px;
  font-size: 10px;
  color: var(--gold-dark);
  background: rgba(201,168,76,0.08);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ========================================
   MONTH VIEW: Calendar Grid
   ======================================== */
.cal-grid {
  padding: 0 16px 16px;
}

.cal-table {
  width: 100%;
  border-collapse: collapse;
  background: var(--white);
  border-radius: var(--radius-md);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}

.cal-table th {
  padding: 10px 0;
  background: var(--primary-dark);
  color: var(--white);
  font-weight: 600;
  font-size: 13px;
  text-align: center;
}

.cal-table th.sun {
  color: #ffb4b4;
}

.cal-table th.sat {
  color: #b4d4ff;
}

.cal-table td {
  border: 1px solid var(--border-light);
  vertical-align: top;
  padding: 4px 6px;
  height: 80px;
  cursor: pointer;
  transition: background 0.15s;
  width: 14.28%;
}

.cal-table td:hover {
  background: #f0f4fb;
}

.cal-table td.other-month {
  background: #f9fafb;
  color: #c0c8d4;
}

.cal-table td.today {
  border: 2px solid var(--gold-dark);
  background: rgba(201,168,76,0.04);
}

.cal-day-num {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 4px;
  color: inherit;
}

.cal-day-num.sun {
  color: #d9534f;
}

.cal-day-num.sat {
  color: #5b8dd9;
}

.cal-dots {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
}

.cal-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--member-color, var(--primary-dark));
}

/* ========================================
   Footer
   ======================================== */
.app-footer {
  text-align: center;
  padding: 16px 0 8px;
  font-size: 10px;
  color: #b0b8c8;
  letter-spacing: 1px;
}

.app-footer-gold {
  color: var(--gold-dark);
  font-weight: bold;
}

/* ========================================
   Animations
   ======================================== */
.fade-in {
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ========================================
   Responsive
   ======================================== */
@media (max-width: 768px) {
  .header {
    padding: 12px 14px 10px;
  }

  .header-title {
    font-size: 16px;
  }

  .header-right {
    gap: 6px;
  }

  .sync-label {
    display: none;
  }

  .tab-btn {
    padding: 10px 16px;
    font-size: 13px;
  }

  .date-display {
    font-size: 14px;
    min-width: 120px;
  }

  .board-fields {
    grid-template-columns: 1fr;
  }

  .week-grid td {
    min-width: 80px;
  }

  .cal-table td {
    height: 60px;
    padding: 3px 4px;
  }

  .cal-day-num {
    font-size: 11px;
  }

  .cal-dot {
    width: 6px;
    height: 6px;
  }

  .member-card {
    margin: 8px 10px;
  }
}

@media (max-width: 480px) {
  .header-portal-btn {
    display: none;
  }

  .tab-btn {
    padding: 10px 12px;
    font-size: 12px;
  }

  .filter-btn {
    padding: 4px 10px;
    font-size: 11px;
  }

  .nav-btn-text {
    padding: 5px 12px;
    font-size: 12px;
  }
}

/* ========================================
   Reduced Motion
   ======================================== */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }

  .gold-line {
    animation: none;
    background-size: 100% 100%;
  }
}
</style>
