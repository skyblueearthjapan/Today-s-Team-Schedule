<script>
/**
 * チームスケジュール フロントエンドJS
 * A+C+B 保存方式実装
 * A: Draft (localStorage即座保存)
 * C: ChangeQueue (変更キュー)
 * B: Backend (遅延サーバー保存)
 */

// ========================================
// A層: DraftStore (ローカル保存)
// ========================================
var DraftStore = (function() {
  var STORAGE_KEY_PREFIX = 'teamSchedule_board_v1_';

  function getStorageKey(date) {
    return STORAGE_KEY_PREFIX + date;
  }

  function saveDraft(date, memberName, fieldName, value) {
    try {
      var key = getStorageKey(date);
      var drafts = loadAllDrafts(date);
      if (!drafts[memberName]) {
        drafts[memberName] = {};
      }
      drafts[memberName][fieldName] = value;
      drafts[memberName]._timestamp = Date.now();
      localStorage.setItem(key, JSON.stringify(drafts));
      return true;
    } catch (e) {
      console.error('Failed to save draft:', e);
      return false;
    }
  }

  function loadAllDrafts(date) {
    try {
      var key = getStorageKey(date);
      var data = localStorage.getItem(key);
      return data ? JSON.parse(data) : {};
    } catch (e) {
      console.error('Failed to load drafts:', e);
      return {};
    }
  }

  function loadMemberDraft(date, memberName) {
    var drafts = loadAllDrafts(date);
    return drafts[memberName] || null;
  }

  function clearDraft(date, memberName) {
    try {
      var key = getStorageKey(date);
      var drafts = loadAllDrafts(date);
      delete drafts[memberName];
      if (Object.keys(drafts).length === 0) {
        localStorage.removeItem(key);
      } else {
        localStorage.setItem(key, JSON.stringify(drafts));
      }
      return true;
    } catch (e) {
      console.error('Failed to clear draft:', e);
      return false;
    }
  }

  function clearAllDrafts(date) {
    try {
      var key = getStorageKey(date);
      localStorage.removeItem(key);
      return true;
    } catch (e) {
      console.error('Failed to clear all drafts:', e);
      return false;
    }
  }

  function hasDrafts(date) {
    var drafts = loadAllDrafts(date);
    return Object.keys(drafts).length > 0;
  }

  return {
    saveDraft: saveDraft,
    loadAllDrafts: loadAllDrafts,
    loadMemberDraft: loadMemberDraft,
    clearDraft: clearDraft,
    clearAllDrafts: clearAllDrafts,
    hasDrafts: hasDrafts
  };
})();

// ========================================
// C層: ChangeQueue (変更キュー)
// ========================================
var ChangeQueue = (function() {
  var queue = {}; // { memberName: { memberName, location?, returnTime?, notes? } }
  var pendingSave = null;

  function addChange(memberName, fieldName, value) {
    if (!queue[memberName]) {
      queue[memberName] = { memberName: memberName };
    }
    queue[memberName][fieldName] = value;
  }

  function getChanges() {
    return Object.values(queue);
  }

  function hasChanges() {
    return Object.keys(queue).length > 0;
  }

  function clearChanges() {
    queue = {};
  }

  function clearMemberChanges(memberName) {
    delete queue[memberName];
  }

  function setPendingSave(timeoutId) {
    if (pendingSave) {
      clearTimeout(pendingSave);
    }
    pendingSave = timeoutId;
  }

  function clearPendingSave() {
    if (pendingSave) {
      clearTimeout(pendingSave);
      pendingSave = null;
    }
  }

  return {
    addChange: addChange,
    getChanges: getChanges,
    hasChanges: hasChanges,
    clearChanges: clearChanges,
    clearMemberChanges: clearMemberChanges,
    setPendingSave: setPendingSave,
    clearPendingSave: clearPendingSave
  };
})();

// ========================================
// SaveManager: A+C+B 統合管理
// ========================================
var SaveManager = (function() {
  var AUTO_SAVE_DELAY = 3000;
  var PERIODIC_SAVE_INTERVAL = 30000;
  var periodicSaveTimer = null;
  var saveStatus = 'saved';
  var isSaving = false;

  function init() {
    startPeriodicSave();

    window.addEventListener('beforeunload', function(e) {
      if (ChangeQueue.hasChanges()) {
        flushChanges();
        e.preventDefault();
        e.returnValue = '保存されていない変更があります';
      }
    });

    window.addEventListener('online', function() {
      updateSaveStatus('unsaved');
      if (ChangeQueue.hasChanges()) {
        scheduleSave();
      }
    });

    window.addEventListener('offline', function() {
      updateSaveStatus('offline');
    });
  }

  function startPeriodicSave() {
    if (periodicSaveTimer) {
      clearInterval(periodicSaveTimer);
    }
    periodicSaveTimer = setInterval(function() {
      if (ChangeQueue.hasChanges() && !isSaving) {
        flushChanges();
      }
    }, PERIODIC_SAVE_INTERVAL);
  }

  function onInputChange(date, memberName, fieldName, value) {
    // A層: localStorage即座保存
    DraftStore.saveDraft(date, memberName, fieldName, value);
    // C層: キューに追加
    ChangeQueue.addChange(memberName, fieldName, value);
    updateSaveStatus('unsaved');
    scheduleSave();
  }

  function scheduleSave() {
    ChangeQueue.clearPendingSave();
    var timeoutId = setTimeout(function() {
      flushChanges();
    }, AUTO_SAVE_DELAY);
    ChangeQueue.setPendingSave(timeoutId);
  }

  function flushChanges() {
    if (!ChangeQueue.hasChanges() || isSaving) {
      return;
    }
    if (!navigator.onLine) {
      updateSaveStatus('offline');
      return;
    }

    isSaving = true;
    updateSaveStatus('saving');

    var changes = ChangeQueue.getChanges();
    var date = App.getDate();

    google.script.run
      .withSuccessHandler(function(results) {
        onSaveSuccess(results);
      })
      .withFailureHandler(function(error) {
        onSaveError(error);
      })
      .api_applyBoardPatch(date, changes);
  }

  function onSaveSuccess(results) {
    isSaving = false;
    if (!results) {
      updateSaveStatus('error');
      return;
    }

    var allSuccess = true;
    results.forEach(function(result) {
      if (result.success) {
        DraftStore.clearDraft(App.getDate(), result.memberName);
        ChangeQueue.clearMemberChanges(result.memberName);
        // Update the board fields in the UI if data returned
        if (result.data) {
          App.updateBoardFields(result.memberName, result.data);
        }
      } else {
        allSuccess = false;
        console.error('Save failed for ' + result.memberName + ':', result.error);
      }
    });

    if (allSuccess) {
      ChangeQueue.clearChanges();
      updateSaveStatus('saved');
    } else {
      updateSaveStatus('error');
    }
  }

  function onSaveError(error) {
    console.error('Save error:', error);
    isSaving = false;
    updateSaveStatus('error');
    // Retry after 30s
    setTimeout(function() {
      if (ChangeQueue.hasChanges()) {
        flushChanges();
      }
    }, 30000);
  }

  function updateSaveStatus(status) {
    saveStatus = status;
    var statusEl = document.getElementById('saveStatus');
    if (!statusEl) return;

    var messages = {
      'saved': '保存済み',
      'saving': '保存中...',
      'unsaved': '未保存',
      'error': '保存失敗',
      'offline': 'オフライン'
    };

    var classes = {
      'saved': 'save-status-saved',
      'saving': 'save-status-saving',
      'unsaved': 'save-status-unsaved',
      'error': 'save-status-error',
      'offline': 'save-status-offline'
    };

    statusEl.textContent = messages[status] || '';
    statusEl.className = 'save-status ' + (classes[status] || '');
  }

  function manualSave() {
    if (ChangeQueue.hasChanges()) {
      ChangeQueue.clearPendingSave();
      flushChanges();
    }
  }

  return {
    init: init,
    onInputChange: onInputChange,
    manualSave: manualSave,
    flushChanges: flushChanges
  };
})();

// ========================================
// EventModal: 統一予定詳細・編集モーダル
// ========================================
var EventModal = (function() {
  var state = {
    isOpen: false,
    dateStr: null,
    memberName: null,
    mode: 'list',
    formMode: null,
    formType: null,
    editingEvent: null,
    personalEvents: [],
    teamEvents: [],
    allMembersEvents: {}
  };


  function open(dateStr, memberName) {
    state.isOpen = true;
    state.dateStr = dateStr;
    state.memberName = memberName;
    state.mode = 'list';
    state.editingEvent = null;

    var modal = document.getElementById('eventModal');
    modal.classList.remove('hidden');

    document.getElementById('modalDate').textContent = Helpers.formatDisplayDate(dateStr);

    var selectDiv = document.getElementById('modalMemberSelect');
    if (!memberName) {
      selectDiv.classList.remove('hidden');
      populateMemberDropdown();
      document.getElementById('modalMemberLabel').textContent = 'メンバーを選択してください';
      document.getElementById('modalAddPersonal').classList.add('hidden');
    } else {
      selectDiv.classList.add('hidden');
      document.getElementById('modalMemberLabel').textContent = memberName;
      document.getElementById('modalAddPersonal').classList.remove('hidden');
    }

    showListView();
    loadDetail();
  }

  function close() {
    state.isOpen = false;
    document.getElementById('eventModal').classList.add('hidden');
  }

  function handleOverlayClick(e) {
    if (e.target.id === 'eventModal') {
      close();
    }
  }

  function populateMemberDropdown() {
    var dropdown = document.getElementById('modalMemberDropdown');
    dropdown.innerHTML = '<option value="">-- メンバーを選択 --</option>';

    var appMembers = App.getMembers();
    appMembers.forEach(function(m) {
      var opt = document.createElement('option');
      opt.value = m.name;
      opt.textContent = m.name;
      dropdown.appendChild(opt);
    });
  }

  function onMemberChange() {
    var dropdown = document.getElementById('modalMemberDropdown');
    var name = dropdown.value;
    if (name) {
      state.memberName = name;
      document.getElementById('modalMemberLabel').textContent = name;
      document.getElementById('modalAddPersonal').classList.remove('hidden');
      loadDetail();
    }
  }

  function loadDetail() {
    if (!state.dateStr) return;

    showModalLoading(true);

    google.script.run
      .withSuccessHandler(function(data) {
        showModalLoading(false);
        if (data) {
          state.personalEvents = data.personalEvents || [];
          state.teamEvents = data.teamEvents || [];
          state.allMembersEvents = data.allMembersEvents || {};
          renderEventList();
        }
      })
      .withFailureHandler(function(err) {
        showModalLoading(false);
        console.error('getDayDetail error:', err);
      })
      .api_getDayDetail(state.dateStr, state.memberName || '');
  }

  function renderEventList() {
    var teamListEl = document.getElementById('modalTeamEventList');
    var personalListEl = document.getElementById('modalPersonalEventList');
    var teamSection = document.getElementById('modalTeamEvents');
    var personalSection = document.getElementById('modalPersonalEvents');
    var emptyState = document.getElementById('modalEmptyState');

    teamListEl.innerHTML = '';
    personalListEl.innerHTML = '';

    var hasTeam = state.teamEvents.length > 0;
    var hasPersonal = state.personalEvents.length > 0;

    teamSection.classList.toggle('hidden', !hasTeam);
    state.teamEvents.forEach(function(ev) {
      teamListEl.appendChild(createEventCard(ev, true));
    });

    if (state.memberName) {
      // 特定メンバー選択時: そのメンバーの個人予定のみ
      personalSection.classList.remove('hidden');
      if (hasPersonal) {
        state.personalEvents.forEach(function(ev) {
          personalListEl.appendChild(createEventCard(ev, false));
        });
      } else {
        personalListEl.innerHTML = '<div class="event-modal-empty" style="padding:16px;">予定なし</div>';
      }
    } else {
      // メンバー未指定時: 全メンバーの個人予定を表示
      var allEvents = state.allMembersEvents || {};
      var memberNames = Object.keys(allEvents);
      var hasAnyPersonal = memberNames.length > 0;

      personalSection.classList.toggle('hidden', !hasAnyPersonal);
      if (hasAnyPersonal) {
        memberNames.forEach(function(mName) {
          var memberHeader = document.createElement('div');
          memberHeader.className = 'modal-member-group-header';
          memberHeader.textContent = mName;
          personalListEl.appendChild(memberHeader);

          allEvents[mName].forEach(function(ev) {
            personalListEl.appendChild(createEventCard(ev, false));
          });
        });
      }

      hasPersonal = hasAnyPersonal;
    }

    emptyState.classList.toggle('hidden', hasTeam || hasPersonal || !!state.memberName);
  }

  function createEventCard(ev, isTeam) {
    var card = document.createElement('div');
    card.className = 'modal-event-card' + (isTeam ? ' team-event' : '');

    var timeBlock = document.createElement('div');
    timeBlock.className = 'modal-event-time-block';

    if (ev.all_day) {
      var badge = document.createElement('div');
      badge.className = 'modal-event-allday-badge';
      badge.textContent = '終日';
      timeBlock.appendChild(badge);
    } else if (ev.start_time) {
      var timeMain = document.createElement('div');
      timeMain.className = 'modal-event-time';
      timeMain.textContent = ev.start_time.substring(0, 5);
      timeBlock.appendChild(timeMain);

      if (ev.end_time) {
        var timeEnd = document.createElement('div');
        timeEnd.className = 'modal-event-time-end';
        timeEnd.textContent = ev.end_time.substring(0, 5);
        timeBlock.appendChild(timeEnd);
      }
    }

    card.appendChild(timeBlock);

    var info = document.createElement('div');
    info.className = 'modal-event-info';

    var title = document.createElement('div');
    title.className = 'modal-event-title';
    title.textContent = ev.title || '(無題)';
    info.appendChild(title);

    if (ev.memo) {
      var memo = document.createElement('div');
      memo.className = 'modal-event-memo';
      memo.textContent = ev.memo;
      info.appendChild(memo);
    }

    card.appendChild(info);

    var editIcon = document.createElement('div');
    editIcon.className = 'modal-event-edit-icon';
    editIcon.innerHTML = '&#9998;';
    card.appendChild(editIcon);

    card.addEventListener('click', function() {
      if (isTeam) {
        showForm('edit', 'team', ev);
      } else {
        showForm('edit', 'personal', ev);
      }
    });

    return card;
  }

  function showForm(mode, type, eventData) {
    state.mode = 'form';
    state.formMode = mode;
    state.formType = type;
    state.editingEvent = eventData || null;

    document.getElementById('modalListView').classList.add('hidden');
    document.getElementById('modalFormView').classList.remove('hidden');

    var formTitle = document.getElementById('modalFormTitle');
    var badge = document.getElementById('modalFormBadge');
    var deleteBtn = document.getElementById('formDeleteBtn');

    if (mode === 'new') {
      formTitle.textContent = type === 'team' ? 'チーム予定を追加' : '個人予定を追加';
      deleteBtn.classList.add('hidden');
    } else {
      formTitle.textContent = type === 'team' ? 'チーム予定を編集' : '個人予定を編集';
      deleteBtn.classList.remove('hidden');
    }

    badge.classList.remove('hidden', 'badge-personal', 'badge-team', 'badge-reservation');
    if (type === 'team') {
      badge.textContent = 'チーム';
      badge.classList.add('badge-team');
    } else {
      badge.textContent = '個人';
      badge.classList.add('badge-personal');
    }

    // 時刻セレクトを30分刻みで初期化
    populateTimeSelect_(document.getElementById('formStartTime'));
    populateTimeSelect_(document.getElementById('formEndTime'));

    var data = eventData || {};
    document.getElementById('formTitle').value = data.title || '';
    document.getElementById('formStartDate').value = data.start_date || state.dateStr || '';
    document.getElementById('formEndDate').value = data.end_date || data.start_date || state.dateStr || '';
    document.getElementById('formAllDay').checked = !!data.all_day;
    setTimeSelectValue_(document.getElementById('formStartTime'), data.start_time || '');
    setTimeSelectValue_(document.getElementById('formEndTime'), data.end_time || '');
    document.getElementById('formMemo').value = data.memo || '';
    document.getElementById('formError').classList.add('hidden');

    toggleAllDay();

    setTimeout(function() {
      document.getElementById('formTitle').focus();
    }, 100);
  }

  function hideForm() {
    state.mode = 'list';
    document.getElementById('modalFormView').classList.add('hidden');
    document.getElementById('modalListView').classList.remove('hidden');
  }

  function showListView() {
    document.getElementById('modalFormView').classList.add('hidden');
    document.getElementById('modalListView').classList.remove('hidden');
  }

  function toggleAllDay() {
    var isAllDay = document.getElementById('formAllDay').checked;
    document.getElementById('formTimeFields').classList.toggle('hidden', isAllDay);
  }

  function save() {
    var title = document.getElementById('formTitle').value.trim();
    var startDate = document.getElementById('formStartDate').value;
    var endDate = document.getElementById('formEndDate').value || startDate;
    var allDay = document.getElementById('formAllDay').checked;
    var startTime = allDay ? '' : document.getElementById('formStartTime').value;
    var endTime = allDay ? '' : document.getElementById('formEndTime').value;
    var memo = document.getElementById('formMemo').value.trim();

    var errors = [];
    if (!title) errors.push('タイトルは必須です');
    if (title.length > 100) errors.push('タイトルは100文字以内');
    if (!startDate) errors.push('開始日は必須です');
    if (endDate && endDate < startDate) errors.push('終了日は開始日以降に');

    if (errors.length > 0) {
      var errEl = document.getElementById('formError');
      errEl.textContent = errors.join(' / ');
      errEl.classList.remove('hidden');
      return;
    }

    document.getElementById('formError').classList.add('hidden');

    var payload = {
      title: title,
      start_date: startDate,
      end_date: endDate,
      start_time: startTime,
      end_time: endTime,
      all_day: allDay,
      memo: memo,
      color_key: (state.editingEvent && state.editingEvent.color_key) || 'other'
    };

    if (state.formType === 'team') {
      saveTeamEvent(payload);
    } else {
      savePersonalEvent(payload);
    }
  }

  function saveTeamEvent(payload) {
    showModalLoading(true);

    if (state.formMode === 'edit' && state.editingEvent && state.editingEvent.team_event_id) {
      payload.team_event_id = state.editingEvent.team_event_id;
      google.script.run
        .withSuccessHandler(onSaveSuccess)
        .withFailureHandler(onSaveError)
        .api_updateTeamEvent(payload);
    } else {
      google.script.run
        .withSuccessHandler(onSaveSuccess)
        .withFailureHandler(onSaveError)
        .api_createTeamEvent(payload);
    }
  }

  function savePersonalEvent(payload) {
    if (!state.memberName) {
      showToast('メンバーを選択してください', 'error');
      return;
    }

    showModalLoading(true);

    if (state.formMode === 'edit' && state.editingEvent && state.editingEvent.event_id) {
      payload.event_id = state.editingEvent.event_id;
      google.script.run
        .withSuccessHandler(function(result) {
          onSaveSuccess(result);
        })
        .withFailureHandler(onSaveError)
        .api_updatePersonalEvent(state.memberName, payload);
    } else {
      google.script.run
        .withSuccessHandler(function(result) {
          onSaveSuccess(result);
        })
        .withFailureHandler(onSaveError)
        .api_createPersonalEvent(state.memberName, payload);
    }
  }

  function deleteEvent() {
    if (!state.editingEvent) return;

    var title = state.editingEvent.title || '(無題)';
    if (!confirm('「' + title + '」を削除しますか？')) return;

    showModalLoading(true);

    if (state.formType === 'team' && state.editingEvent.team_event_id) {
      google.script.run
        .withSuccessHandler(onSaveSuccess)
        .withFailureHandler(onSaveError)
        .api_deleteTeamEvent(state.editingEvent.team_event_id);
    } else if (state.editingEvent.event_id && state.memberName) {
      google.script.run
        .withSuccessHandler(function(result) {
          onSaveSuccess(result);
        })
        .withFailureHandler(onSaveError)
        .api_deletePersonalEvent(state.memberName, state.editingEvent.event_id);
    }
  }

  function onSaveSuccess(result) {
    showModalLoading(false);
    if (result && result.success) {
      showToast(result.message || '保存しました', 'success');
      close();
      App.reloadCurrentTab();
    } else {
      var errMsg = (result && result.error) || '保存に失敗しました';
      var errEl = document.getElementById('formError');
      errEl.textContent = errMsg;
      errEl.classList.remove('hidden');
      state.mode = 'form';
      document.getElementById('modalFormView').classList.remove('hidden');
      document.getElementById('modalListView').classList.add('hidden');
    }
  }

  function onSaveError(err) {
    showModalLoading(false);
    showToast('エラー: ' + (err.message || err), 'error');
  }

  function showModalLoading(show) {
    var loadingEl = document.getElementById('modalLoading');
    var listView = document.getElementById('modalListView');
    var formView = document.getElementById('modalFormView');

    if (show) {
      loadingEl.classList.remove('hidden');
      listView.classList.add('hidden');
      formView.classList.add('hidden');
    } else {
      loadingEl.classList.add('hidden');
      if (state.mode === 'form') {
        formView.classList.remove('hidden');
      } else {
        listView.classList.remove('hidden');
      }
    }
  }

  return {
    open: open,
    close: close,
    handleOverlayClick: handleOverlayClick,
    onMemberChange: onMemberChange,
    showForm: showForm,
    hideForm: hideForm,
    toggleAllDay: toggleAllDay,
    save: save,
    deleteEvent: deleteEvent
  };
})();

// ========================================
// 30分刻み時刻セレクト（共通ユーティリティ）
// ========================================
function populateTimeSelect_(selectEl) {
  selectEl.innerHTML = '';
  var emptyOpt = document.createElement('option');
  emptyOpt.value = '';
  emptyOpt.textContent = '--:--';
  selectEl.appendChild(emptyOpt);
  for (var h = 0; h < 24; h++) {
    for (var m = 0; m < 60; m += 30) {
      var val = String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
      var opt = document.createElement('option');
      opt.value = val;
      opt.textContent = val;
      selectEl.appendChild(opt);
    }
  }
}

/** セレクトに値をセット。選択肢にない時刻は動的にoptionを追加 */
function setTimeSelectValue_(selectEl, timeVal) {
  if (!timeVal) { selectEl.value = ''; return; }
  for (var i = 0; i < selectEl.options.length; i++) {
    if (selectEl.options[i].value === timeVal) {
      selectEl.value = timeVal;
      return;
    }
  }
  var newOpt = document.createElement('option');
  newOpt.value = timeVal;
  newOpt.textContent = timeVal;
  var inserted = false;
  for (var j = 1; j < selectEl.options.length; j++) {
    if (timeVal < selectEl.options[j].value) {
      selectEl.insertBefore(newOpt, selectEl.options[j]);
      inserted = true;
      break;
    }
  }
  if (!inserted) selectEl.appendChild(newOpt);
  selectEl.value = timeVal;
}

// ========================================
// Toast notification
// ========================================
function showToast(message, type) {
  type = type || 'info';
  var existing = document.querySelector('.toast');
  if (existing) existing.remove();

  var toast = document.createElement('div');
  toast.className = 'toast toast-' + type;
  toast.textContent = message;
  document.body.appendChild(toast);

  setTimeout(function() {
    if (toast.parentNode) toast.remove();
  }, 3000);
}

// ========================================
// Helpers
// ========================================
var Helpers = (function() {
  var DAY_NAMES = ['日', '月', '火', '水', '木', '金', '土'];

  function formatDisplayDate(dateStr) {
    if (!dateStr) return '';
    var parts = dateStr.split('-');
    var y = parseInt(parts[0], 10);
    var m = parseInt(parts[1], 10);
    var d = parseInt(parts[2], 10);
    var dt = new Date(y, m - 1, d);
    var dow = DAY_NAMES[dt.getDay()];
    return m + '月' + d + '日（' + dow + '）';
  }

  function formatDisplayDateShort(dateStr) {
    if (!dateStr) return '';
    var parts = dateStr.split('-');
    var m = parseInt(parts[1], 10);
    var d = parseInt(parts[2], 10);
    return m + '/' + d;
  }

  function getDayName(dayIndex) {
    return DAY_NAMES[dayIndex] || '';
  }

  function addDays(dateStr, n) {
    var parts = dateStr.split('-');
    var dt = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
    dt.setDate(dt.getDate() + n);
    return formatDateISO(dt);
  }

  function formatDateISO(dt) {
    var y = dt.getFullYear();
    var m = ('0' + (dt.getMonth() + 1)).slice(-2);
    var d = ('0' + dt.getDate()).slice(-2);
    return y + '-' + m + '-' + d;
  }

  function getWeekRange(dateStr) {
    var parts = dateStr.split('-');
    var dt = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
    var day = dt.getDay();
    // Monday start: if Sunday (0), go back 6; else go back (day-1)
    var diff = day === 0 ? 6 : day - 1;
    var monday = new Date(dt);
    monday.setDate(dt.getDate() - diff);
    var sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);
    return {
      start: formatDateISO(monday),
      end: formatDateISO(sunday)
    };
  }

  function getMonthInfo(dateStr) {
    var parts = dateStr.split('-');
    return {
      year: parseInt(parts[0], 10),
      month: parseInt(parts[1], 10)
    };
  }

  function todayISO() {
    var now = new Date();
    return formatDateISO(now);
  }

  function escapeHtml(str) {
    if (!str) return '';
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  return {
    formatDisplayDate: formatDisplayDate,
    formatDisplayDateShort: formatDisplayDateShort,
    getDayName: getDayName,
    addDays: addDays,
    formatDateISO: formatDateISO,
    getWeekRange: getWeekRange,
    getMonthInfo: getMonthInfo,
    todayISO: todayISO,
    escapeHtml: escapeHtml
  };
})();

    document.querySelectorAll('.tab-btn').forEach(function(btn) {
      btn.classList.toggle('active', btn.dataset.tab === tab);
    });

    els.tabWeek.classList.toggle('hidden', tab !== 'week');

      btn.className = 'filter-btn member-' + (i % 5);

  function toggleAllFilter() {
    var allVisible = members.every(function(m) {
      return filterState[m.name] !== false;
    });

    members.forEach(function(m) {
      filterState[m.name] = !allVisible;
    });

    saveFilterState();
    buildFilterBar();
    applyFilter();
  }

  function toggleMemberFilter(name) {
    filterState[name] = filterState[name] === false ? true : false;

  function createBoardField(fieldName, labelText, inputType, value, date, memberName) {
    var field = document.createElement('div');
    field.className = 'board-field';

    var label = document.createElement('label');
    label.textContent = labelText;
    field.appendChild(label);

    var input;
    if (inputType === 'time') {
      // 30分刻みセレクト
      input = document.createElement('select');
      input.name = fieldName;
      input.dataset.member = memberName;
      input.dataset.field = fieldName;
      populateTimeSelect_(input);
      setTimeSelectValue_(input, value);
    } else {
      input = document.createElement('input');
      input.type = inputType;
      input.name = fieldName;
      input.value = value;
      input.dataset.member = memberName;
      input.dataset.field = fieldName;
    }

    // A+C+B: input/change event
    input.addEventListener('input', function(e) {
      SaveManager.onInputChange(date, memberName, fieldName, e.target.value);
    });

    input.addEventListener('change', function(e) {
      SaveManager.onInputChange(date, memberName, fieldName, e.target.value);
    });

    // Enter key -> manual save (text inputs only)
    if (inputType !== 'time') {
      input.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          SaveManager.manualSave();
        }
      });
    }

    field.appendChild(input);
    return field;
  }

  function restoreDrafts(date) {
    var drafts = DraftStore.loadAllDrafts(date);
    var draftMembers = Object.keys(drafts);
    if (draftMembers.length === 0) return;

    draftMembers.forEach(function(memberName) {
      var draft = drafts[memberName];
      if (!draft) return;

      var card = document.querySelector('.member-card[data-member="' + CSS.escape(memberName) + '"]');
      if (!card) return;

      ['location', 'returnTime', 'notes'].forEach(function(field) {
        if (draft[field] !== undefined) {
          var input = card.querySelector('input[data-field="' + field + '"]');
          if (input) {
            input.value = draft[field];
            ChangeQueue.addChange(memberName, field, draft[field]);
          }
        }
      });
    });

    if (ChangeQueue.hasChanges()) {
      SaveManager.flushChanges();
    }
  }

  function updateBoardFields(memberName, data) {
    var card = document.querySelector('.member-card[data-member="' + CSS.escape(memberName) + '"]');
    if (!card || !data) return;

    ['location', 'returnTime', 'notes'].forEach(function(field) {
      if (data[field] !== undefined) {
        var input = card.querySelector('input[data-field="' + field + '"]');
        if (input) {
          input.value = data[field] || '';
        }
      }
    });
  }

          evDiv.style.color = 'var(--gold-dark)';
          var prefix = ev.all_day ? '終日' : (ev.start_time ? ev.start_time.substring(0, 5) : '');
          evDiv.textContent = (prefix ? prefix + ' ' : '') + (ev.title || '');
          evDiv.title = (prefix ? prefix + ' ' : '') + (ev.title || '');
          td.appendChild(evDiv);
        });

        (function(dayDate) {
          td.addEventListener('click', function() {
            EventModal.open(dayDate, null);
          });
        })(day.date);

        trTeam.appendChild(td);
      });

      tbody.appendChild(trTeam);
    }

    // Member rows
    memberList.forEach(function(m, mi) {
      var tr = document.createElement('tr');
      tr.className = 'week-member-row';
      tr.dataset.member = m.name;

      var idx = memberIndexMap[m.name] !== undefined ? memberIndexMap[m.name] : (mi % 5);

      var tdName = document.createElement('td');
      tdName.className = 'member-name-cell member-' + idx;
      tdName.textContent = m.name;
      tr.appendChild(tdName);

      data.days.forEach(function(day) {
        var td = document.createElement('td');
        if (day.date === today) {
          td.classList.add('today-col');
        }

        // Events for this member on this day
        var dayEvents = (day.events && day.events[m.name]) ? day.events[m.name] : [];
        var dayBoard = (day.board && day.board[m.name]) ? day.board[m.name] : null;

        dayEvents.forEach(function(ev) {
          var evDiv = document.createElement('div');
          evDiv.className = 'week-event-item';
          var prefix = ev.all_day ? '終日' : (ev.start_time ? ev.start_time.substring(0, 5) : '');
          evDiv.textContent = (prefix ? prefix + ' ' : '') + (ev.title || '');
          evDiv.title = (prefix ? prefix + ' ' : '') + (ev.title || '');
          td.appendChild(evDiv);
        });

        // Board info
        if (dayBoard && (dayBoard.location || dayBoard.returnTime)) {
          var boardDiv = document.createElement('div');
          boardDiv.className = 'week-board-info';
          var parts = [];
          if (dayBoard.location) parts.push(dayBoard.location);
          if (dayBoard.returnTime) parts.push(dayBoard.returnTime);
          boardDiv.textContent = parts.join(' / ');
          boardDiv.title = parts.join(' / ');
          td.appendChild(boardDiv);
        }

        // Click to open event modal
        (function(dayDate, mName) {
          td.addEventListener('click', function() {
            EventModal.open(dayDate, mName);
          });
        })(day.date, m.name);

        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    els.weekGrid.appendChild(table);

    applyFilter();
  }

  // ========================================
  // MONTH VIEW
  // ========================================
  function loadMonthView() {
    var info = Helpers.getMonthInfo(currentDate);
    els.monthDisplay.textContent = info.year + '年' + info.month + '月';

    showLoading(true);

    google.script.run
      .withSuccessHandler(function(data) {
        showLoading(false);
        if (data) {
          renderMonthView(data);
        } else {
          showStatus('月間データを取得できませんでした', 'error', 3000);
        }
      })
      .withFailureHandler(function(err) {
        showLoading(false);
        onError(err);
      })
      .api_getMonthView(info.year, info.month);
  }

  function navigateMonth(delta) {
    var info = Helpers.getMonthInfo(currentDate);
    var newMonth = info.month + delta;
    var newYear = info.year;

    if (newMonth < 1) {
      newMonth = 12;
      newYear--;
    } else if (newMonth > 12) {
      newMonth = 1;
      newYear++;
    }

    currentDate = newYear + '-' + ('0' + newMonth).slice(-2) + '-01';
    loadMonthView();
  }

  function renderMonthView(data) {
    els.calGrid.innerHTML = '';

    var year = data.year;
    var month = data.month;
    var events = data.events || {};
    var memberList = data.members || members;
    var today = Helpers.todayISO();

    var table = document.createElement('table');
    table.className = 'cal-table';

    // Day-of-week header (Sun start, Japanese style)
    var dayNames = ['日', '月', '火', '水', '木', '金', '土'];
    var thead = document.createElement('thead');
    var headerRow = document.createElement('tr');
    dayNames.forEach(function(dn, i) {
      var th = document.createElement('th');
      th.textContent = dn;
      if (i === 0) th.classList.add('sun');
      if (i === 6) th.classList.add('sat');
      headerRow.appendChild(th);
    });
    thead.appendChild(headerRow);
    table.appendChild(thead);

    // Build calendar grid
    var firstDay = new Date(year, month - 1, 1);
    var startDow = firstDay.getDay(); // 0=Sun
    var daysInMonth = new Date(year, month, 0).getDate();

    // Previous month fill
    var prevMonthDays = new Date(year, month - 1, 0).getDate();

    var tbody = document.createElement('tbody');
    var row = document.createElement('tr');
    var cellCount = 0;

    // Fill previous month cells
    for (var p = startDow - 1; p >= 0; p--) {
      var td = document.createElement('td');
      td.className = 'other-month';
      var dayNum = document.createElement('div');
      dayNum.className = 'cal-day-num';
      dayNum.textContent = prevMonthDays - p;
      td.appendChild(dayNum);
      row.appendChild(td);
      cellCount++;
    }

    // Current month cells
    for (var d = 1; d <= daysInMonth; d++) {
      if (cellCount === 7) {
        tbody.appendChild(row);
        row = document.createElement('tr');
        cellCount = 0;
      }

      var td = document.createElement('td');
      var dateStr = year + '-' + ('0' + month).slice(-2) + '-' + ('0' + d).slice(-2);
      var dt = new Date(year, month - 1, d);
      var dow = dt.getDay();

      if (dateStr === today) {
        td.classList.add('today');
      }

      var dayNumEl = document.createElement('div');
      dayNumEl.className = 'cal-day-num';
      if (dow === 0) dayNumEl.classList.add('sun');
      if (dow === 6) dayNumEl.classList.add('sat');
      dayNumEl.textContent = d;
      td.appendChild(dayNumEl);

      // Event summary for this day
      var dayEvents = events[dateStr];
      if (dayEvents) {
        var eventsContainer = document.createElement('div');
        eventsContainer.className = 'cal-events';

        // Team events
        if (dayEvents['_TEAM_'] && dayEvents['_TEAM_'].length > 0) {
          dayEvents['_TEAM_'].forEach(function(ev) {
            var evEl = document.createElement('div');
            evEl.className = 'cal-event-item cal-event-team';
            evEl.textContent = ev.title || '(チーム)';
            evEl.title = (ev.start_time ? ev.start_time.substring(0, 5) + ' ' : '') + (ev.title || '');
            eventsContainer.appendChild(evEl);
          });
        }

        // Member events
        memberList.forEach(function(m) {
          if (dayEvents[m.name] && dayEvents[m.name].length > 0 && isMemberVisible(m.name)) {
            var idx = memberIndexMap[m.name] !== undefined ? memberIndexMap[m.name] : 0;
            dayEvents[m.name].forEach(function(ev) {
              var evEl = document.createElement('div');
              evEl.className = 'cal-event-item cal-event-member member-' + idx;
              var prefix = ev.start_time ? ev.start_time.substring(0, 5) + ' ' : '';
              evEl.textContent = prefix + (ev.title || '') + ' (' + m.name + ')';
              evEl.title = m.name + ': ' + prefix + (ev.title || '');
              eventsContainer.appendChild(evEl);
            });
          }
        });

        td.appendChild(eventsContainer);
      }

      // Click to open event modal
      (function(clickDate) {
        td.addEventListener('click', function() {
          EventModal.open(clickDate, null);
        });
      })(dateStr);

      row.appendChild(td);
      cellCount++;
    }

    // Fill remaining cells with next month
    var nextDay = 1;
    while (cellCount < 7) {
      var td = document.createElement('td');
      td.className = 'other-month';
      var dayNumEl = document.createElement('div');
      dayNumEl.className = 'cal-day-num';
      dayNumEl.textContent = nextDay++;
      td.appendChild(dayNumEl);
      row.appendChild(td);
      cellCount++;
    }
    tbody.appendChild(row);

    table.appendChild(tbody);
    els.calGrid.appendChild(table);
  }

  // ========================================
  // Sync
  // ========================================
  function doSync() {
    els.syncBtn.classList.add('syncing');

    google.script.run
      .withSuccessHandler(function(result) {
        els.syncBtn.classList.remove('syncing');
        if (result && result.success) {
          showStatus('同期完了: ' + (result.eventCount || 0) + '件の予定を取得', 'success', 3000);
          if (result.timestamp) updateSyncTime(result.timestamp);
          // Reload current tab
          if (currentTab === 'today') loadTodayView();
          else if (currentTab === 'week') loadWeekView();
          else if (currentTab === 'month') loadMonthView();
        } else {
          var errMsg = (result && result.errors && result.errors.length > 0)
            ? result.errors.map(function(e) { return e.member + ': ' + e.error; }).join(', ') : '同期に失敗しました';
          showStatus(errMsg, 'error', 5000);
        }
      })
      .withFailureHandler(function(err) {
        els.syncBtn.classList.remove('syncing');
        showStatus('同期エラー: ' + (err.message || err), 'error', 5000);
      })
      .api_syncNow();
  }

  function updateSyncTime(timestamp) {
    if (!timestamp) return;
    try {
      var dt = new Date(timestamp);
      var h = ('0' + dt.getHours()).slice(-2);
      var m = ('0' + dt.getMinutes()).slice(-2);
      els.lastSync.textContent = '最終同期: ' + h + ':' + m;
    } catch (e) {
      els.lastSync.textContent = '最終同期: --';
    }
  }

  // ========================================
  // UI Helpers
  // ========================================
  function showLoading(show) {
    if (show) {
      els.loading.classList.remove('hidden');
    } else {
      els.loading.classList.add('hidden');
    }
  }

  function showStatus(message, type, autoHideMs) {
    els.statusMessage.textContent = message;
    els.statusMessage.className = 'status-message ' + (type || 'info');
    els.statusMessage.classList.remove('hidden');

    if (autoHideMs) {
      setTimeout(function() {
        els.statusMessage.classList.add('hidden');
      }, autoHideMs);
    }
  }

  function onError(error) {
    showLoading(false);
    var msg = error && error.message ? error.message : String(error);
    showStatus('エラー: ' + msg, 'error', 8000);
    console.error('App error:', error);
  }

  // ========================================
  // Public API
  // ========================================
  return {
    init: init,
    getDate: function() { return currentDate; },
    getMembers: function() { return members; },
    updateBoardFields: updateBoardFields,
    reloadCurrentTab: function() {
      if (currentTab === 'today') loadTodayView();
      else if (currentTab === 'week') loadWeekView();
      else if (currentTab === 'month') loadMonthView();
    }
  };
})();

// ========================================
// Bootstrap
// ========================================
document.addEventListener('DOMContentLoaded', App.init);
</script>
